<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSRTC | Reset Password</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container single-card-layout">
  <div class="auth-card">
    
    <div class="auth-nav" style="justify-content: center; margin-bottom: 20px;">
      <a href="../index.html" class="logo">
        <img src="../msrtc_new_logo.png" alt="MSRTC Logo">
      </a>
    </div>

    <h1 style="text-align: center;">Reset Password 🔑</h1>
    <p class="sub-heading" style="text-align: center;">Create a new secure password for your account.</p>

    <form id="resetForm" novalidate>
      
      <div class="form-group">
        <label for="resetPass">New Password</label>
        <input type="password" id="resetPass" class="form-control" placeholder="Enter new password">
        <span class="toggle-password" title="Show/Hide Password">👁️‍🗨️</span>
      </div>

      <div class="form-group">
        <label for="resetConfirm">Confirm New Password</label>
        <input type="password" id="resetConfirm" class="form-control" placeholder="Confirm new password">
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top: 16px;">
        <span class="btn-text">Update Password</span>
        <div class="spinner"></div>
      </button>

    </form>
    
  </div>
</div>

<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
