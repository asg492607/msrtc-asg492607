apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service
  namespace: msrtc-prod
spec:
  hosts:
  - booking-service.msrtc-prod.svc.cluster.local
  http:
  - route:
    - destination:
        host: booking-service.msrtc-prod.svc.cluster.local
        subset: v1
      weight: 90
    - destination:
        host: booking-service.msrtc-prod.svc.cluster.local
        subset: v2
      weight: 10
    retries:
      attempts: 3
      perTryTimeout: 2s
