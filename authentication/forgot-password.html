<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSRTC | Forgot Password</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container single-card-layout">
  <div class="auth-card">
    
    <div class="auth-nav" style="justify-content: center; margin-bottom: 20px;">
      <a href="../index.html" class="logo">
        <img src="../msrtc_new_logo.png" alt="MSRTC Logo">
      </a>
    </div>

    <h1 style="text-align: center;">Forgot Password? 🔒</h1>
    <p class="sub-heading" style="text-align: center;">Enter your registered mobile number to receive an OTP to reset your password.</p>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label for="forgotMobile">Mobile Number</label>
        <input type="tel" id="forgotMobile" class="form-control" placeholder="Enter 10-digit mobile number" maxlength="10">
      </div>

      <button type="submit" class="btn btn-primary">
        <span class="btn-text">Send OTP</span>
        <div class="spinner"></div>
      </button>

      <div class="bottom-text" style="margin-top: 24px;">
        Remember your password? <a href="login.html">Login</a>
      </div>
    </form>
    
  </div>
</div>

<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
