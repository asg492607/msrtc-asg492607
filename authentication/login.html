<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSRTC | Login</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
  
  <!-- Left Side: Illustration -->
  <div class="auth-left">
    <img src="../msrtc_hero_bg.jpg" alt="MSRTC Bus" class="illustration">
  </div>

  <!-- Right Side: Login Card -->
  <div class="auth-right">
    <div class="auth-card">
      
      <div class="auth-nav">
        <a href="../index.html" class="logo">
          <img src="../msrtc_new_logo.png" alt="MSRTC Logo">
        </a>
        <div class="lang-switch">
          <select>
            <option>English</option>
            <option>मराठी</option>
            <option>हिन्दी</option>
          </select>
        </div>
      </div>

      <h1>Welcome Back 👋</h1>
      <p class="sub-heading">Login to manage your bookings and passes.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginMobile">Mobile Number</label>
          <input type="tel" id="loginMobile" class="form-control" placeholder="Enter 10-digit mobile number" maxlength="10">
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
          <span class="toggle-password" title="Show/Hide Password">👁️‍🗨️</span>
        </div>

        <div class="auth-links">
          <label class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            Remember Me
          </label>
          <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary">
          <span class="btn-text">Login</span>
          <div class="spinner"></div>
        </button>

        <div class="divider">OR</div>

        <button type="button" class="btn btn-outline" onclick="triggerOTPLogin(event)">
          <span class="btn-text">Login with OTP</span>
        </button>

        <div class="bottom-text">
          New to MSRTC? <a href="signup.html">Create an Account</a>
        </div>
      </form>
      
    </div>
  </div>

</div>

<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
