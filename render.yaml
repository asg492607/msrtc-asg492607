services:
  # ---------------------------------------------------------
  # 1. API Gateway (Backend serving static frontend)
  # ---------------------------------------------------------
  - type: web
    name: msrtc-api-gateway
    env: node
    region: singapore
    plan: free
    rootDir: backend/apps/api-gateway
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
