<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSRTC | Profile Settings</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <a href="../index.html"><img src="../msrtc_new_logo.png" alt="MSRTC Logo"></a>
    </div>
    
    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
      <a href="my-tickets.html" class="nav-item">🎫 My Tickets</a>
      <a href="#" class="nav-item">💳 Bus Passes</a>
      <a href="#" class="nav-item">📦 Parcel Services</a>
      <a href="#" class="nav-item">⚠️ Complaints</a>
      <a href="profile.html" class="nav-item active">⚙️ Settings</a>
    </nav>

    <div class="user-profile">
      <div class="avatar">G</div>
      <div class="user-info">
        <div class="name">Guest User</div>
        <div class="role">Passenger</div>
      </div>
      <button style="margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-light);" onclick="handleLogout()" title="Logout">🚪</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    
    <div class="top-header">
      <h1>Settings & Profile</h1>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" data-target="tabProfile">Personal Info</div>
        <div class="tab" data-target="tabSecurity">Security</div>
        <div class="tab" data-target="tabPrefs">Preferences</div>
      </div>

      <div class="tab-content active" id="tabProfile">
        <form onsubmit="saveProfile(event)">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" class="form-control" value="Guest User">
            </div>
            <div class="form-group">
              <label>Mobile Number</label>
              <input type="tel" class="form-control" value="9876543210" disabled>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" placeholder="example@email.com">
            </div>
            <div class="form-group">
              <label>Gender</label>
              <select class="form-control">
                <option>Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Save Changes</button>
        </form>
      </div>

      <div class="tab-content" id="tabSecurity" style="display: none;">
        <form onsubmit="saveProfile(event)">
          <div class="form-group" style="max-width: 400px;">
            <label>Current Password</label>
            <input type="password" class="form-control">
          </div>
          <div class="form-group" style="max-width: 400px;">
            <label>New Password</label>
            <input type="password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Update Password</button>
        </form>
      </div>

      <div class="tab-content" id="tabPrefs" style="display: none;">
        <form onsubmit="saveProfile(event)">
          <div class="form-group" style="max-width: 400px;">
            <label>Language</label>
            <select class="form-control">
              <option>English</option>
              <option>Marathi</option>
              <option>Hindi</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Save Preferences</button>
        </form>
      </div>
    </div>

  </main>

  <div id="toast" class="toast"></div>

  <script src="js/dashboard.js"></script>
</body>
</html>
